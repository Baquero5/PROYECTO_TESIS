database:
  host: localhost
  port: 3307
  user: root
  password: "123456"
  name: TESIS

dataset:
  source_path: "D:\\m5-forecasting-accuracy"
  tiendas:
    - CA_1
    - CA_3
    - TX_1
    - TX_2
    - WI_1
  tiendas_nombres:
    CA_1: "Tienda Central"
    CA_3: "Tienda Norte"
    TX_1: "Tienda Sur"
    TX_2: "Tienda Este"
    WI_1: "Tienda Oeste"
  num_productos: 100
  categoria_principal: "Alimentos"
  subcategorias:
    FOODS_1:
      nombre: "Enlatados y Conservas"
      descripcion: "Productos enlatados, conservas y alimentos no perecederos"
    FOODS_2:
      nombre: "Empacados"
      descripcion: "Alimentos empacados, granos, cereales y productos secos"
    FOODS_3:
      nombre: "Frescos"
      descripcion: "Productos frescos, perecederos, lacteos y carnes"

modelos:
  xgboost:
    n_estimators: 1000
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
  lightgbm:
    n_estimators: 1000
    num_leaves: 63
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    random_state: 42

ensemble:
  xgboost_weight: 0.5
  lightgbm_weight: 0.5

features:
  - precio
  - dia_semana
  - mes
  - fin_de_mes
  - rezago_1
  - rezago_7
  - rezago_14
  - rezago_28
  - media_movil_7
  - media_movil_14
  - media_movil_28
  - desviacion_estandar_7
  - desviacion_estandar_28
  - cambio_precio_1
  - es_festivo
  - mes_seno
  - dia_semana_seno
  - maximo_movil_28
  - minimo_movil_28

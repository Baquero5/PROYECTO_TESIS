database:
  host: localhost
  port: 3307
  user: root
  password: "123456"
  name: tesis_inventario

dataset:
  source_path: "C:\\Users\\CRISTHIAM\\Downloads\\m5-forecasting-accuracy"
  tiendas:
    - CA_1
    - CA_3
    - TX_1
    - TX_2
    - WI_1
  tiendas_nombres:
    CA_1: "Tienda Central"
    CA_3: "Tienda Norte"
    TX_1: "Tienda Sur"
    TX_2: "Tienda Este"
    WI_1: "Tienda Oeste"
  num_productos: 100
  subcategorias:
    FOODS_1:
      nombre: "Enlatados y Conservas"
      descripcion: "Productos enlatados, conservas y alimentos no perecederos"
    FOODS_2:
      nombre: "Empacados"
      descripcion: "Alimentos empacados, granos, cereales y productos secos"
    FOODS_3:
      nombre: "Frescos"
      descripcion: "Productos frescos, perecederos, lacteos y carnes"

modelos:
  xgboost:
    n_estimators: 1000
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
  lightgbm:
    n_estimators: 1000
    num_leaves: 63
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    random_state: 42

ensemble:
  xgboost_weight: 0.5
  lightgbm_weight: 0.5

features:
  - price
  - dayofweek
  - month
  - is_month_end
  - lag_1
  - lag_7
  - lag_14
  - lag_28
  - rolling_mean_7
  - rolling_mean_14
  - rolling_mean_28
  - rolling_std_7
  - rolling_std_28
  - price_change_1
  - is_holiday
  - month_sin
  - dayofweek_sin
  - rolling_max_28
  - rolling_min_28
